<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galleria AR - Bucchero Next</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>
    <nav>
        <div class="logo">GALLERIA AR</div>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">HOME</a></li>
            <li><a href="storia.html">STORIA</a></li>
            <li><a href="gallery.html" class="active">GALLERIA AR</a></li>
            <li><a href="progetto.html">PROGETTO</a></li>
        </ul>
    </nav>

    <div class="gallery-container">
        <div class="artifact-card">
            <model-viewer src="bucchero_calice_dal_tumulo_di_Molinello.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls shadow-intensity="1" auto-rotate>
                <button slot="ar-button" class="ar-button" style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%);">AR</button>
            </model-viewer>
            <div class="info"><h3>Calice Molinello</h3></div>
        </div>
        <div class="artifact-card">
            <model-viewer src="bucchero_caryatid.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls shadow-intensity="1" auto-rotate>
                <button slot="ar-button" class="ar-button" style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%);">AR</button>
            </model-viewer>
            <div class="info"><h3>Bucchero Cariatide</h3></div>
        </div>
        <div class="artifact-card">
            <model-viewer src="bucchero_kantharos.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls shadow-intensity="1" auto-rotate>
                <button slot="ar-button" class="ar-button" style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%);">AR</button>
            </model-viewer>
            <div class="info"><h3>Kantharos</h3></div>
        </div>
        <div class="artifact-card">
            <model-viewer src="bucchero_kotyle.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls shadow-intensity="1" auto-rotate>
                <button slot="ar-button" class="ar-button" style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%);">AR</button>
            </model-viewer>
            <div class="info"><h3>Kotyle</h3></div>
        </div>
        <div class="artifact-card">
            <model-viewer src="bucchero_ladle.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls shadow-intensity="1" auto-rotate>
                <button slot="ar-button" class="ar-button" style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%);">AR</button>
            </model-viewer>
            <div class="info"><h3>Attingitoio (Ladle)</h3></div>
        </div>
        <div class="artifact-card">
            <model-viewer src="bucchero_oinochoe_con_bocca_trilobata.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls shadow-intensity="1" auto-rotate>
                <button slot="ar-button" class="ar-button" style="position:absolute; bottom:10px; left:50%; transform:translateX(-50%);">AR</button>
            </model-viewer>
            <div class="info"><h3>Oinochoe Trilobata</h3></div>
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');
        hamburger.addEventListener('click', () => { navLinks.classList.toggle('active'); });
    </script>
</body>
</html>
